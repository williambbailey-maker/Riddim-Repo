<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="description" content="Riddim — a drum track library. Drop in wav/mp3 drum loops and get a groove going.">
  <title>Riddim — Drum Track Library</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1 class="wordmark">RIDDIM<span class="wordmark-dot">.</span></h1>
      <span class="tagline">Drum Track Library</span>
    </div>
    <div class="topbar-actions">
      <button id="add-btn" class="btn-primary" type="button">Add Tracks</button>
      <input id="file-input" type="file" accept="audio/*,.wav,.mp3,.ogg,.flac,.m4a,.aac,.aiff" multiple hidden>
    </div>
  </header>

  <section class="toolbar">
    <input id="search" class="search" type="search" placeholder="SEARCH TRACKS OR TAGS" autocomplete="off">
    <select id="sort" class="select" title="Sort library">
      <option value="added-desc">Newest first</option>
      <option value="added-asc">Oldest first</option>
      <option value="name-asc">Name A→Z</option>
      <option value="name-desc">Name Z→A</option>
      <option value="bpm-asc">BPM low→high</option>
      <option value="bpm-desc">BPM high→low</option>
      <option value="duration-asc">Shortest first</option>
      <option value="duration-desc">Longest first</option>
    </select>
  </section>

  <div id="tag-bar" class="tag-bar" hidden></div>

  <main id="library" class="library" aria-live="polite"></main>

  <div id="empty-state" class="empty-state">
    <div class="accent-bar"></div>
    <h2>Drop your<br>drums here.</h2>
    <p>Drag <strong>.WAV</strong> or <strong>.MP3</strong> tracks anywhere on this page, or hit <strong>Add Tracks</strong>.
       Stored in your browser. Loop one up — lay an instrument over it.</p>
  </div>

  <div id="drop-overlay" class="drop-overlay" hidden>
    <div class="drop-overlay-inner">
      <span class="drop-title">Drop<br>to add.</span>
      <span class="drop-sub">Release to import into your library</span>
    </div>
  </div>

  <!-- Player bar -->
  <footer id="player" class="player" hidden>
    <div class="player-wave-wrap">
      <canvas id="player-wave" class="player-wave"></canvas>
      <div class="player-times">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>
    <div class="player-controls">
      <div class="player-now">
        <div id="player-title" class="player-title">—</div>
        <div id="player-meta" class="player-meta"></div>
      </div>
      <div class="player-buttons">
        <button id="prev-btn" class="transport-btn" title="Previous track" aria-label="Previous track">Prev</button>
        <button id="play-btn" class="play-btn" title="Play/Pause (Space)" aria-label="Play or pause">▶</button>
        <button id="next-btn" class="transport-btn" title="Next track" aria-label="Next track">Next</button>
        <button id="loop-btn" class="transport-btn loop-btn toggled" title="Loop (on by default — keep the groove going)" aria-label="Toggle loop">Loop</button>
      </div>
      <div class="player-extras">
        <label class="rate-label" title="Playback speed">
          <select id="rate" class="select select-small">
            <option value="0.75">0.75×</option>
            <option value="0.9">0.9×</option>
            <option value="1" selected>1×</option>
            <option value="1.1">1.1×</option>
            <option value="1.25">1.25×</option>
          </select>
        </label>
        <input id="volume" class="volume" type="range" min="0" max="1" step="0.01" value="1" title="Volume">
      </div>
    </div>
  </footer>

  <!-- Edit dialog -->
  <dialog id="edit-dialog" class="dialog">
    <form method="dialog" id="edit-form">
      <div class="accent-bar"></div>
      <h3>Edit Track</h3>
      <label>Name
        <input id="edit-name" type="text" required maxlength="120" autocomplete="off">
      </label>
      <label>BPM
        <div class="bpm-row">
          <input id="edit-bpm" type="number" min="20" max="400" step="0.1" placeholder="92" autocomplete="off">
          <button type="button" id="tap-tempo" class="btn-outline" title="Tap along with the track to set BPM">Tap Tempo</button>
        </div>
      </label>
      <label>Tags <span class="hint">— comma separated</span>
        <input id="edit-tags" type="text" placeholder="funk, halftime, brushes" autocomplete="off">
      </label>
      <div class="dialog-actions">
        <button type="button" id="edit-delete" class="btn-ghost btn-danger">Delete</button>
        <span class="spacer"></span>
        <button type="button" id="edit-cancel" class="btn-ghost">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" hidden></div>

  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
